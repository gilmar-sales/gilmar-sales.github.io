<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <title>{{ page.title }}</title>
    <!-- Anti-flash: apply saved theme before any rendering -->
    <script>
        (function () {
            var saved = localStorage.getItem("gs-theme");
            var sys = window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
            document.documentElement.setAttribute("data-theme", saved || sys);
            document.documentElement.classList.add("no-transition");
            window.addEventListener("load", function () {
                document.documentElement.classList.remove("no-transition");
            });
        })();
    </script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{{ site.baseurl }}/css/base.css"/>
    <link rel="stylesheet" href="{{ site.baseurl }}/css/tables.css"/>
    <link rel="stylesheet" href="{{ site.baseurl }}/css/highlight-dark.css"/>
    <link rel="stylesheet" href="{{ site.baseurl }}/css/nova-ui-tokens.css"/>
    <link rel="stylesheet" href="{{ site.baseurl }}/css/nova-ui-screens.css"/>
    <!-- Font Awesome -->
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
            integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
    />
    <!-- MathJax -->
    <script
            id="MathJax-script"
            async
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    ></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scaleable=no">
</head>
<body class="grid paper">
<div class="container">
    <nav class="nav">
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="/" class="nav-brand">gs</a>
            <div style="font-family: var(--font-mono); font-size: 11px; color: var(--ink-4); letter-spacing: 0.04em;">gilmar-sales</div>
        </div>
        <nav>
            <a href="/" {% if page.url == "/" %}class="active"{% endif %}>início</a>
            <a href="/projects/" {% if page.url contains "/projects" %}class="active"{% endif %}>projetos</a>
            <a href="/tools/" {% if page.url contains "/tools" %}class="active"{% endif %}>ferramentas</a>
        </nav>
        <div class="tools">
            <button class="lang-pill" id="lang-toggle">
                <b>PT</b> <span style="opacity: .5">/</span> EN
            </button>
            <button class="icon-btn" id="search-toggle" aria-label="Buscar">
                <i class="fas fa-search"></i>
            </button>
            <button class="icon-btn" id="theme-toggle" aria-label="Alternar tema">
                <i id="theme-icon" class="fas fa-moon"></i>
            </button>
        </div>
        <div
            style="
                position: fixed;
                background: var(--accent);
                top: 4rem;
                left: 0;
                height: 2px;
                width: 0%;
                border-radius: 2px;
            "
            id="top-progress-bar"
        ></div>
    </nav>
    <div class="content">
        <div class="main-wrapper">
            {{ content }}
            {% include footer.html %}
        </div>
    </div>
</div>
{% include search.html %}
<script>
    (function () {
        var html = document.documentElement;
        var btn = document.getElementById("theme-toggle");
        var icon = document.getElementById("theme-icon");

        function updateIcon() {
            icon.className =
                html.getAttribute("data-theme") === "dark"
                    ? "fas fa-sun"
                    : "fas fa-moon";
        }

        updateIcon();

        btn.addEventListener("click", function () {
            var next =
                html.getAttribute("data-theme") === "dark" ? "light" : "dark";
            html.setAttribute("data-theme", next);
            localStorage.setItem("gs-theme", next);
            updateIcon();
        });

        // Language toggle (placeholder for future i18n)
        var langBtn = document.getElementById("lang-toggle");
        langBtn.addEventListener("click", function() {
            // Future: switch between PT/EN content
        });
    })();
</script>
</body>
</html>
