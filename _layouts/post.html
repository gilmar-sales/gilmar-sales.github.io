---
layout: default
---

<div class="post-container">
  <div class="post-header">
    <a class="post-title">{{ page.title }}</a>
    <span class="post-info">{{ page.date | date: "%d-%m-%Y" }}</span>
  </div>
  <div class="post-content">
    {{ page.content }}
  </div>
  <div class="post-footer">
    Por: {{ page.author }}
  </div>
</div>
